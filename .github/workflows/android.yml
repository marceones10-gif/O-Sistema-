name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: kivy/buildozer:latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Build APK
      run: buildozer android debug
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: LelexApp-APK
        path: bin/*.apk
